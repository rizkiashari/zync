# Static SPA — paths relative to this file (server-chat/). Requires client-chat/dist on host.
services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "${WEB_PUBLISH_PORT:-4173}:80"
    volumes:
      - ../client-chat/dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
